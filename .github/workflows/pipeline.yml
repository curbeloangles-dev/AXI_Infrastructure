name: AXI Infrastructure CI/CD pipeline
on: [push, pull_request]

jobs:
  # axi_gpio jobs
  axi_gpio_check:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check_version.outputs.should_publish }}
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_DEV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if version needs publishing
        id: check_version
        working-directory: ./axi_gpio/
        run: |
          # Create temporary .npmrc file in this directory
          echo "@curbeloangles-dev:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

          # Check if package version exists
          VERSION=$(jq -r .version package.json)
          PKG=@curbeloangles-dev/axi_gpio
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if npm view $PKG@$VERSION --registry=https://npm.pkg.github.com/ --silent; then
            echo "✅ Package $PKG@$VERSION already exists. Skipping tests and publish."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "📦 Package $PKG@$VERSION does not exist. Will run tests and publish."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  axi_gpio_test:
    needs: axi_gpio_check
    if: needs.axi_gpio_check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GHDL
        uses: ghdl/setup-ghdl@v1
        with:
          version: nightly
          backend: llvm
          investigate: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'

      - name: Install dependencies
        run: |
          pip install cocotb==1.8.1 pytest cocotb-test cocotb-bus

      - name: Run axi_gpio test
        run: |
          cd axi_gpio
          npm run test

  axi_gpio_release:
    needs: [axi_gpio_check, axi_gpio_test]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.axi_gpio_check.outputs.should_publish == 'true' &&
      needs.axi_gpio_test.result == 'success'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_DEV }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'

      - name: Publish axi_gpio IP if version changed
        working-directory: ./axi_gpio/
        run: |
          # Create temporary .npmrc file in this directory
          echo "@curbeloangles-dev:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

          VERSION=$(jq -r .version package.json)
          PKG=@curbeloangles-dev/axi_gpio

          echo "📦 Publishing $PKG@$VERSION..."
          npm publish
          echo "✅ Successfully published $PKG@$VERSION"

